name: Build ChimeraOS image
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/builder

on:
  workflow_call:
    inputs:
      postfix:
        type: string
        description: Postfix used in release.
        default: ''
      version:
        type: string
        description: Version to build / tag to create (if provided)
        default: ''
      tag:
        type: string
        description: Explicit git tag name to attach the release to (if provided)
        default: ''

jobs:
  build-system-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}
    outputs:
      version: ${{ steps.build_image.outputs.version }}
      display_name: ${{ steps.build_image.outputs.display_name }}
      display_version: ${{ steps.build_image.outputs.display_version }}
      disk_image_filename: ${{ steps.build_image.outputs.disk_image_filename }}
      update_image_filename: ${{ steps.build_image.outputs.update_image_filename }}
      image_tag: ${{ steps.set_image_tag.outputs.image_tag }}
    steps:
      - name: Set 8.8.8.8 as dns server
        run: |
          sudo sed -i 's/#DNS=/DNS=8.8.8.8 8.8.4.4/g' /etc/systemd/resolved.conf
          sudo systemctl daemon-reload
          sudo systemctl restart systemd-networkd
          sudo systemctl restart systemd-resolved
      - run: |
          sudo prlimit --pid $$ --nofile=500000:500000
          ulimit -a
      - name: Maximize build space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/share/java
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /opt/az
          df -h
      - uses: actions/checkout@v4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - uses: actions/download-artifact@v4
        with:
            pattern: AUR-packages*
            merge-multiple: true
            path: aur-pkgs/
      - uses: actions/download-artifact@v4
        with:
            pattern: Packages*
            merge-multiple: true
            path: pkgs/
      - uses: actions/download-artifact@v4
        name: Download rootfs artifact
        with:
            name: rootfs
            path: /tmp/rootfs
      - name: Install software dependencies
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt-get install -y qemu-user-static debootstrap rsync lsb-release gzip zstd xz-utils policycoreutils  
          sudo apt-get install -y git wget curl coreutils util-linux dos2unix bsdmainutils uuid-runtime syslinux-utils
          sudo apt-get install -y btrfs-progs dosfstools mtools parted libelf-dev efitools libnss3-tools pesign mount efitools libnss3-tools
      - name: Install embuer
        run: |
          wget https://github.com/NeroReflex/embuer/releases/download/0.2.23/embuer_0.2.23-1_amd64.trixie.deb
          sudo dpkg -i embuer_0.2.23-1_amd64.trixie.deb
          sudo apt-get --fix-broken install -y
      - name: Clean debs to free space
        run: |
          sudo rm *.deb
      - name: Populate private key from github secrets
        run: |
          echo "${{ secrets.SIGNING_KEY }}" > private_key.pem
      - name: Build system image
        id: build_image
        env:
          OUTPUT_DIR: ${{ github.workspace }}/output
        run: |
          set -euo pipefail
          # metadata-action may output multiple tags (newline-separated). Use the first tag.
          TAGS="${{ steps.meta.outputs.tags }}"
          FIRST_TAG="$(printf '%s\n' "$TAGS" | head -n1)"
          sudo env GITHUB_OUTPUT="${GITHUB_OUTPUT:-}" OUTPUT_DIR="${OUTPUT_DIR}" bash build-image.sh "$FIRST_TAG"
      - name: Remove private key
        run: |
          rm -f private_key.pem
      - name: Upload Package Archives
        uses: actions/upload-artifact@v4
        with:
            name: release-packages
            compression-level: 0
            path: |
              output/${{ steps.build_rootfs.outputs.rootfs }}
              output/*.img
              output/*.txt